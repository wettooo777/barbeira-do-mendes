<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Alura - Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="caixa">
            <h1><img src="logo.png" alt="Logo da Barbearia Alura"></h1>
            <nav>
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="produtos.html">Produtos</a></li>
                    <li><a href="contatos.html">Contato</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <form>
            <h1>FALE CONOSCO</h1>

            <fieldset>
                <p>Nome e Sobrenome</p>
                <input type="text" class="input-texto" required>

                <p>Email</p>
                <input type="email" class="input-texto" required placeholder="wellitonhenrik@gmail.com">

                <p>Telefone</p>
                <input type="tel" class="input-texto" required placeholder="(43) 99636 8910">

                <p>Mensagem</p>
                <textarea cols="70" rows="10" required></textarea>
            </fieldset>

            <fieldset>
                <legend>Como você prefere o nosso contato?</legend>
                <p><input type="radio" name="contato" value="email"> Email</p>
                <p><input type="radio" name="contato" value="Telefone"> Telefone</p>
                <p><input type="radio" name="contato" value="whatsapp" checked> Whatsapp</p>
            </fieldset>

            <fieldset>
                <legend>Qual horário você gostaria ser atendido?</legend>
                <select>
                    <option>Manhã</option>
                    <option>Tarde</option>
                    <option>Noite</option>
                </select>
            </fieldset>
            
            </form>
    </main>

    <footer>
        <img src="logo-branco.png" alt="Logo branca Barbearia Alura">
        <p class="copyright">&copy; Copyright Barbearia Alura - 2019</p>
    </footer>
</body>
</html>
